<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SolarArk Kognitiv Xotira</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #fcfdfc;
            --text-color: #1e272e;
            --primary-color: #05c46b;
            --cell-bg: #f1f2f6;
            --cell-active: #05c46b;
            --cell-error: #ff3f34;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            justify-content: center;
        }
        #header { text-align: center; margin-bottom: 25px; }
        h1 { font-size: 26px; margin: 0 0 8px 0; letter-spacing: -0.5px; }
        p { margin: 0; font-size: 14px; color: #808e9b; font-weight: 500; }
        
        #grid { 
            display: grid; 
            gap: 10px; 
            margin-bottom: 30px; 
            padding: 15px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cell { 
            background-color: var(--cell-bg); 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .cell.active { background-color: var(--cell-active); transform: scale(0.95); box-shadow: 0 4px 10px rgba(5, 196, 107, 0.3); }
        .cell.error { background-color: var(--cell-error); animation: shake 0.3s ease-in-out; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        button { 
            background-color: var(--text-color); 
            color: #ffffff; 
            border: none; 
            padding: 14px 32px; 
            font-size: 16px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 600; 
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(30, 39, 46, 0.2);
            transition: all 0.2s;
        }
        button:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(30, 39, 46, 0.2); }
        
        #message { margin-top: 20px; font-weight: 600; font-size: 15px; height: 20px; letter-spacing: 0.3px; }
        
        #footer {
            margin-top: auto;
            text-align: center;
            padding-bottom: 10px;
        }
        .signature {
            font-size: 11px;
            color: #a4b0be;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        #tg-block {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 999; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 30px; box-sizing: border-box;
        }
        #tg-block h2 { color: var(--text-color); margin-bottom: 15px; font-size: 22px; }
        #tg-block p { color: #808e9b; margin-bottom: 30px; font-size: 15px; line-height: 1.5; }
        #tg-block a {
            background-color: var(--primary-color); color: white; padding: 14px 32px;
            text-decoration: none; border-radius: 30px; font-weight: 700; font-size: 16px;
            box-shadow: 0 8px 20px rgba(5, 196, 107, 0.3); transition: all 0.2s;
        }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(252, 253, 252, 0.95); backdrop-filter: blur(5px); z-index: 100;
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="tg-block">
        <h2>Tizimga kirish rad etildi</h2>
        <p>Kognitiv mashqlar ekotizimi faqat yopiq Telegram muhitida ishlaydi. Davom etish uchun rasmiy botga o'ting.</p>
        <a href="https://t.me/FotoXotiraBot">@FotoXotiraBot</a>
    </div>

    <div id="overlay">
        <h2 id="overlay-title" style="margin-bottom: 10px;"></h2>
        <p id="overlay-desc" style="margin-bottom: 25px; color: #808e9b; font-size: 15px;"></p>
        <button id="overlay-btn"></button>
    </div>

    <div id="main-container">
        <div id="header">
            <h1>Kognitiv Daraja: <span id="level-display">1</span></h1>
            <p>Sessiya: <span id="session-display">0</span>/30 | Umumiy: <span id="limit-display">0</span>/90</p>
        </div>

        <div id="grid"></div>
        <button id="start-btn" onclick="startLevel()">Zarba</button>
        <div id="message"></div>
    </div>

    <div id="footer">
        <span class="signature">ILM Mizan me'morligida bunyod etildi</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
            document.getElementById('tg-block').style.display = 'flex';
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('footer').style.display = 'none';
        }

        const DAILY_LIMIT = 90;
        const SESSION_LIMIT = 30;
        const COOLDOWN_MS = 60 * 60 * 1000; // 1 soat

        let currentLevel = parseInt(localStorage.getItem('solar_memory_level')) || 1;
        let todayDate = new Date().toDateString();
        
        let savedDate = localStorage.getItem('solar_last_date');
        let dailyCount = parseInt(localStorage.getItem('solar_daily_count')) || 0;
        let sessionCount = parseInt(localStorage.getItem('solar_session_count')) || 0;
        let lastSessionTime = parseInt(localStorage.getItem('solar_last_session_time')) || 0;

        if (savedDate !== todayDate) {
            dailyCount = 0;
            sessionCount = 0;
            lastSessionTime = 0;
            localStorage.setItem('solar_last_date', todayDate);
            localStorage.setItem('solar_daily_count', dailyCount);
            localStorage.setItem('solar_session_count', sessionCount);
            localStorage.setItem('solar_last_session_time', lastSessionTime);
        }

        let gridSize, activeCellsCount, showTime, sequence = [], playerClicks = [], canClick = false;

        function checkLimit() {
            document.getElementById('session-display').innerText = sessionCount;
            document.getElementById('limit-display').innerText = dailyCount;

            if (dailyCount >= DAILY_LIMIT) {
                showOverlay(
                    "Kognitiv Limit [90/90]", 
                    "Bugungi maksimal neyron zo'riqishi bajarildi. Tizim qulflandi. Ertaga qolgan joyidan davom etamiz.", 
                    "Sintezni saqlash", 
                    () => tg.sendData(JSON.stringify({ action: "daily_finished", level: currentLevel, date: todayDate }))
                );
                return true;
            }

            if (sessionCount >= SESSION_LIMIT) {
                let now = Date.now();
                let timePassed = now - lastSessionTime;

                if (timePassed < COOLDOWN_MS) {
                    let timeLeft = Math.ceil((COOLDOWN_MS - timePassed) / 60000); 
                    showOverlay(
                        "Neyronlar Qizib Ketdi", 
                        `Sessiya yakunlandi. Miya axborotni sintez qilishi uchun tanaffus zarur. \n\nTizim ochilishiga: ${timeLeft} daqiqa qoldi.`, 
                        "Kutish", 
                        () => tg.close() 
                    );
                    return true;
                } else {
                    sessionCount = 0;
                    localStorage.setItem('solar_session_count', sessionCount);
                    document.getElementById('session-display').innerText = sessionCount;
                }
            }
            return false;
        }

        function showOverlay(title, desc, btnText, action) {
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('overlay-desc').innerText = desc;
            const btn = document.getElementById('overlay-btn');
            btn.innerText = btnText;
            btn.onclick = action;
            overlay.style.display = 'flex';
        }

        function updateProgress() {
            dailyCount++;
            sessionCount++;
            
            localStorage.setItem('solar_memory_level', currentLevel);
            localStorage.setItem('solar_daily_count', dailyCount);
            localStorage.setItem('solar_session_count', sessionCount);

            if (sessionCount === SESSION_LIMIT) {
                localStorage.setItem('solar_last_session_time', Date.now());
            }
        }

        function initLevelParameters() {
            if (checkLimit()) return;
            gridSize = Math.min(3 + Math.floor((currentLevel - 1) / 5), 6); 
            activeCellsCount = Math.min(3 + Math.floor((currentLevel - 1) / 2), Math.floor((gridSize * gridSize) / 1.5));
            showTime = Math.max(300, 2000 - (currentLevel * 35)); 
            
            document.getElementById('level-display').innerText = currentLevel;
            renderGrid();
        }

        function renderGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            gridElement.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            const containerSize = Math.min(window.innerWidth * 0.85, 380);
            const cellSize = (containerSize - 30 - (gridSize - 1) * 10) / gridSize;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.width = `${cellSize}px`; 
                cell.style.height = `${cellSize}px`;
                cell.onclick = () => handleCellClick(i, cell);
                gridElement.appendChild(cell);
            }
        }

        function startLevel() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('message').innerText = 'Fokusni qarating...';
            document.getElementById('message').style.color = 'var(--text-color)';
            sequence = []; playerClicks = []; canClick = false;

            const cells = document.querySelectorAll('.cell');
            cells.forEach(c => { c.className = 'cell'; c.style.backgroundColor = ''; });

            let indices = Array.from({length: gridSize * gridSize}, (_, i) => i).sort(() => Math.random() - 0.5);
            sequence = indices.slice(0, activeCellsCount);

            setTimeout(() => {
                document.getElementById('message').innerText = '';
                sequence.forEach(i => cells[i].classList.add('active'));
                
                setTimeout(() => {
                    cells.forEach(c => c.classList.remove('active'));
                    canClick = true;
                    document.getElementById('message').innerText = 'Joylashuvni tiklang';
                }, showTime);
            }, 600);
        }

        function handleCellClick(index, cellElement) {
            if (!canClick || playerClicks.includes(index)) return;
            playerClicks.push(index);

            if (sequence.includes(index)) {
                cellElement.classList.add('active');
                if (playerClicks.length === sequence.length) levelComplete();
            } else {
                cellElement.classList.add('error');
                gameOver();
            }
        }

        function levelComplete() {
            canClick = false;
            document.getElementById('message').style.color = 'var(--primary-color)';
            document.getElementById('message').innerText = 'Mukammal yechim';
            
            currentLevel++;
            updateProgress();
            
            setTimeout(() => resetUI('Keyingi daraja'), 1200);
        }

        function gameOver() {
            canClick = false;
            document.getElementById('message').style.color = 'var(--cell-error)';
            document.getElementById('message').innerText = 'Xato. Neyronlar qabul qilmadi.';
            
            const cells = document.querySelectorAll('.cell');
            sequence.forEach(i => {
                if (!playerClicks.includes(i)) {
                    cells[i].style.backgroundColor = 'rgba(5, 196, 107, 0.2)'; 
                }
            });
            
            updateProgress();

            setTimeout(() => resetUI('Qayta urinish'), 1800);
        }

        function resetUI(btnText) {
            document.getElementById('message').innerText = '';
            document.getElementById('start-btn').innerText = btnText;
            document.getElementById('start-btn').style.display = 'block';
            initLevelParameters();
        }

        initLevelParameters();
    </script>
</body>
</html>
